name: CI

on:
  push:
    branches:
      - test
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_REF: ghcr.io/ifrannco/cloud-telegram-bot-practica-01:${{ github.sha }}

permissions:
  contents: read

jobs:
  test:
    name: Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        run: |
          set +e
          pytest --cov=. --cov-report=xml --junitxml=report.xml
          exit_code=$?
          set -e
          if [ "$exit_code" -eq 5 ]; then
            echo "Pytest no encontro tests en el repositorio. Se continua sin fallar el pipeline."
            exit 0
          fi
          exit "$exit_code"

      - name: Upload coverage report
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: warn
          retention-days: 14

      - name: Upload test report
        uses: actions/upload-artifact@v6
        with:
          name: test-report
          path: report.xml
          if-no-files-found: warn
          retention-days: 14

  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@v8
        with:
          name: coverage-report
          path: .

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.sources=.
            -Dsonar.python.coverage.reportPaths=coverage.xml

  build:
    name: Build, Scan and Publish Image
    runs-on: ubuntu-latest
    needs: sonarcloud
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image locally
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          push: false
          tags: ${{ env.IMAGE_REF }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate Trivy JSON report
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD:/workdir" \
            aquasec/trivy:0.65.0 image \
            --severity HIGH,CRITICAL \
            --format json \
            --output /workdir/scanning-report.json \
            "$IMAGE_REF"

      - name: Generate CycloneDX SBOM
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD:/workdir" \
            aquasec/trivy:0.65.0 image \
            --format cyclonedx \
            --output /workdir/sbom.cdx.json \
            "$IMAGE_REF"

      - name: Generate Trivy SARIF
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD:/workdir" \
            aquasec/trivy:0.65.0 image \
            --severity HIGH,CRITICAL \
            --format sarif \
            --output /workdir/trivy-results.sarif \
            "$IMAGE_REF"

      - name: Upload Trivy JSON report
        uses: actions/upload-artifact@v6
        with:
          name: trivy-json-report
          path: scanning-report.json
          if-no-files-found: error
          retention-days: 14

      - name: Upload CycloneDX SBOM
        uses: actions/upload-artifact@v6
        with:
          name: cyclonedx-sbom
          path: sbom.cdx.json
          if-no-files-found: error
          retention-days: 14

      - name: Upload Trivy SARIF as artifact
        uses: actions/upload-artifact@v6
        with:
          name: trivy-sarif-report
          path: trivy-results.sarif
          if-no-files-found: error
          retention-days: 14

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

      - name: Fail on HIGH or CRITICAL vulnerabilities
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.65.0 image \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            "$IMAGE_REF"

      - name: Push Docker image to GHCR
        run: docker push "$IMAGE_REF"

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs:
      - test
      - sonarcloud
      - build
    if: always()

    steps:
      - name: Write workflow summary
        run: |
          echo "## Pipeline summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Testing: ${{ needs.test.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- SonarCloud: ${{ needs.sonarcloud.result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Build / Scan / Publish: ${{ needs.build.result }}" >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ needs.build.result }}" = "success" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### Published image" >> "$GITHUB_STEP_SUMMARY"
            echo "- \`${IMAGE_REF}\`" >> "$GITHUB_STEP_SUMMARY"
          fi
